<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assistência e Gestão - CSC Live</title>
    <link rel="icon" href="/public/img/REDONDOSIMBOLO 01.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #121220; color: #fff; padding-bottom: 30px; overflow-x: hidden; }
        
        /* CABEÇALHO PADRÃO APP */
        .app-header { display: flex; align-items: center; padding: 15px 20px; background-color: #16213e; box-shadow: 0 4px 15px rgba(0,0,0,0.4); position: sticky; top: 0; z-index: 100; gap: 15px; }
        .btn-voltar { color: #a2a2bd; text-decoration: none; font-size: 20px; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05); transition: 0.3s;}
        .btn-voltar:active { transform: scale(0.9); }
        .page-title { font-size: 18px; font-weight: 800; color: #e94560; letter-spacing: 0.5px; margin: 0;}

        .main-container { max-width: 1100px; margin: 20px auto 0; padding: 0 15px; }

        /* SISTEMA DE ABAS (TABS) PARA MOBILE */
        .tabs-container { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .tab-btn { flex: 1; min-width: 120px; padding: 14px; background: #16213e; border: 1px solid rgba(255,255,255,0.05); color: #a2a2bd; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.3s; white-space: nowrap;}
        .tab-btn.active { background: #e94560; color: #fff; border-color: #e94560; box-shadow: 0 4px 10px rgba(233, 69, 96, 0.3);}
        
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ÁREA DE CONTEÚDO E TABELAS */
        .content-card { background: #fff; padding: 20px; border-radius: 16px; color: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-bottom: 20px;}
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; flex-wrap: wrap; gap: 10px;}
        .section-header h2 { font-size: 18px; text-transform: uppercase; color: #333;}
        
        .btn-add { background: #007AFF; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;}
        .btn-add:hover { background: #0056b3; }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; font-weight: 500; font-size: 13px; min-width: 700px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; vertical-align: middle; }
        th { background: #f8f9fa; text-transform: uppercase; font-weight: 800; color: #333;}
        
        /* STATUS BADGES */
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #fff;}
        .bg-pendente { background-color: #dc3545; }
        .bg-andamento { background-color: #f39c12; }
        .bg-concluido { background-color: #28a745; }

        .btn-sm { padding: 6px 10px; border: none; border-radius: 4px; color: #fff; cursor: pointer; font-size: 12px; font-weight: bold;}
        .btn-edit { background-color: #007AFF; }
        .btn-delete { background-color: #dc3545; }

        /* TOAST E MODAL */
        #toast-container { position: fixed; top: 80px; right: 20px; left: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none;}
        .toast { background: #fff; color: #333; padding: 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 12px; border-left: 5px solid #e94560; animation: slideIn 0.3s forwards; font-weight: bold; font-size: 14px; pointer-events: all;}
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center; padding: 20px;}
        .modal-content { background-color: #16213e; padding: 25px; border-radius: 16px; width: 100%; max-width: 400px; position: relative; border: 1px solid rgba(255,255,255,0.1); color: #fff;}
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 24px; font-weight: bold; color: #a2a2bd; cursor: pointer; }
        
        .form-group { margin-bottom: 15px; text-align: left;}
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #a2a2bd; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #1a1a2e; color: #fff; outline: none; font-size: 14px;}
        .btn-salvar-modal { width: 100%; padding: 14px; background: #e94560; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 10px;}

        /* BARRA DE PROGRESSO */
        .progress-container { width: 100%; background: #eee; border-radius: 10px; overflow: hidden; height: 8px; margin-top: 5px;}
        .progress-bar { height: 100%; background: #28a745; transition: 0.4s; }

        @media (max-width: 768px) {
            .section-header { flex-direction: column; align-items: flex-start; }
            .btn-add { width: 100%; justify-content: center; }
            table { font-size: 12px; }
            th, td { padding: 8px; }
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <header class="app-header">
        <a href="/dashboard" class="btn-voltar"><i class="fas fa-arrow-left"></i></a>
        <h1 class="page-title">Gestão e Assistência</h1>
    </header>

    <div class="main-container">
        
        <div class="tabs-container" id="admin-tabs" style="display: none;">
            <button class="tab-btn active" onclick="mudarAba('aba-chamados', this)"><i class="fas fa-ticket-alt"></i> Chamados</button>
            <button class="tab-btn" onclick="mudarAba('aba-usuarios', this)"><i class="fas fa-users"></i> Equipe</button>
            <button class="tab-btn" onclick="mudarAba('aba-aniversarios', this)"><i class="fas fa-birthday-cake"></i> Aniversários</button>
        </div>

        <div id="aba-chamados" class="tab-content active">
            <div class="content-card">
                <div class="section-header">
                    <h2>Quadro de Chamados</h2>
                </div>
                <div class="table-responsive">
                    <table id="tabela-chamados">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Título / Categoria</th>
                                <th>Requerente</th>
                                <th>Status / Progresso</th>
                                <th>Atribuído A</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="aba-usuarios" class="tab-content">
            <div class="content-card">
                <div class="section-header">
                    <h2>Membros do Sistema</h2>
                    <button class="btn-add" onclick="abrirModalUsuario()"><i class="fas fa-user-plus"></i> Novo Membro</button>
                </div>
                <div class="table-responsive">
                    <table id="tabela-usuarios">
                        <thead><tr><th>ID</th><th>Usuário</th><th>Perfil</th><th>Equipe</th><th>Ações</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="aba-aniversarios" class="tab-content">
            <div class="content-card">
                <div class="section-header">
                    <h2>Datas Especiais</h2>
                    <button class="btn-add" onclick="abrirModalNiver()"><i class="fas fa-plus"></i> Adicionar</button>
                </div>
                <div class="table-responsive">
                    <table id="tabela-aniversarios">
                        <thead><tr><th>Nome</th><th>Dia</th><th>Mês</th><th>Ações</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <div id="modal-chamado" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharModal('modal-chamado')">&times;</span>
            <h2 style="margin-bottom: 20px; font-size: 18px;"><i class="fas fa-edit"></i> Atualizar Chamado</h2>
            <input type="hidden" id="edit-chamado-id">
            <div class="form-group">
                <label>Status:</label>
                <select id="edit-status">
                    <option value="Pendente">Pendente</option>
                    <option value="Em Andamento">Em Andamento</option>
                    <option value="Concluído">Concluído</option>
                </select>
            </div>
            <div class="form-group">
                <label>Progresso (%):</label>
                <input type="number" id="edit-progresso" min="0" max="100">
            </div>
            <div class="form-group">
                <label>Atribuir a:</label>
                <input type="text" id="edit-atribuido" placeholder="Nome do técnico">
            </div>
            <button class="btn-salvar-modal" onclick="salvarEdicaoChamado()">Atualizar Ticket</button>
        </div>
    </div>

    <div id="modal-usuario" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharModal('modal-usuario')">&times;</span>
            <h2 style="margin-bottom: 20px; font-size: 18px;"><i class="fas fa-user-plus"></i> Novo Membro</h2>
            <div class="form-group"><label>Usuário (Login):</label><input type="text" id="novo-user" placeholder="ex: joao.silva"></div>
            <div class="form-group"><label>Senha:</label><input type="password" id="novo-senha"></div>
            <div class="form-group">
                <label>Perfil:</label>
                <select id="novo-perfil"><option value="MEMBRO">Membro</option><option value="LIDER">Líder</option><option value="ADMIN">Administrador</option></select>
            </div>
            <div class="form-group">
                <label>Equipe (Letra):</label>
                <input type="text" id="novo-equipe" placeholder="A, B, C... ou NENHUMA" maxlength="10">
            </div>
            <button class="btn-salvar-modal" onclick="salvarUsuario()">Cadastrar</button>
        </div>
    </div>

    <div id="modal-niver" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharModal('modal-niver')">&times;</span>
            <h2 style="margin-bottom: 20px; font-size: 18px;"><i class="fas fa-birthday-cake"></i> Novo Aniversariante</h2>
            <div class="form-group"><label>Nome Completo:</label><input type="text" id="niver-nome"></div>
            <div class="form-group"><label>Dia:</label><input type="number" id="niver-dia" min="1" max="31"></div>
            <div class="form-group"><label>Mês (Número):</label><input type="number" id="niver-mes" min="1" max="12"></div>
            <button class="btn-salvar-modal" onclick="salvarNiver()">Cadastrar</button>
        </div>
    </div>

    <script>
        let usuarioAtual = null;

        function mostrarToast(mensagem, tipo = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast`;
            let icon = '✅'; if(tipo==='warning') {icon='⚠️'; toast.style.borderLeftColor='#f39c12';} if(tipo==='error') {icon='❌'; toast.style.borderLeftColor='#dc3545';}
            toast.innerHTML = `${icon} <span style="margin-left:8px;">${mensagem}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.animation = 'fadeOut 0.3s forwards'; setTimeout(() => toast.remove(), 300); }, 3500);
        }

        window.onload = () => {
            const userStore = localStorage.getItem('usuarioLogado');
            if (!userStore) return window.location.href = '/';
            usuarioAtual = JSON.parse(userStore);

            if (usuarioAtual.perfil === 'ADMIN') {
                document.getElementById('admin-tabs').style.display = 'flex';
            }
            
            carregarChamados();
            if(usuarioAtual.perfil === 'ADMIN'){
                carregarUsuarios();
                carregarAniversarios();
            }
        };

        function mudarAba(abaId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(abaId).classList.add('active');
            btn.classList.add('active');
        }

        function fecharModal(id) { document.getElementById(id).style.display = 'none'; }
        
        // ================= ROTINAS DE CHAMADOS =================
        async function carregarChamados() {
            try {
                const res = await fetch('/api/chamados');
                const chamados = await res.json();
                const tbody = document.querySelector('#tabela-chamados tbody');
                tbody.innerHTML = '';
                
                chamados.forEach(c => {
                    let corBadge = c.status === 'Concluído' ? 'bg-concluido' : (c.status === 'Em Andamento' ? 'bg-andamento' : 'bg-pendente');
                    let botoes = '';
                    if (usuarioAtual.perfil === 'ADMIN') {
                        botoes = `<button class="btn-sm btn-edit" onclick="abrirEdicaoChamado(${c.id}, '${c.status}', ${c.progresso}, '${c.atribuido}')"><i class="fas fa-edit"></i> Atualizar</button>`;
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>#${c.id}</strong></td>
                            <td>
                                <div style="font-weight: bold;">${c.titulo}</div>
                                <div style="font-size: 11px; color: #666;">${c.categoria} - Pri: ${c.prioridade}</div>
                            </td>
                            <td>${c.requerente}</td>
                            <td>
                                <span class="badge ${corBadge}">${c.status}</span>
                                <div class="progress-container"><div class="progress-bar" style="width: ${c.progresso}%"></div></div>
                            </td>
                            <td>${c.atribuido}</td>
                            <td>${botoes}</td>
                        </tr>
                    `;
                });
            } catch (err) { console.log(err); }
        }

        function abrirEdicaoChamado(id, status, progresso, atribuido) {
            document.getElementById('edit-chamado-id').value = id;
            document.getElementById('edit-status').value = status;
            document.getElementById('edit-progresso').value = progresso;
            document.getElementById('edit-atribuido').value = atribuido === '-' ? '' : atribuido;
            document.getElementById('modal-chamado').style.display = 'flex';
        }

        async function salvarEdicaoChamado() {
            const id = document.getElementById('edit-chamado-id').value;
            const payload = {
                status: document.getElementById('edit-status').value,
                progresso: document.getElementById('edit-progresso').value,
                atribuido: document.getElementById('edit-atribuido').value || '-'
            };

            const btn = document.querySelector('#modal-chamado .btn-salvar-modal');
            btn.innerText = "Salvando...";

            try {
                const res = await fetch(`/api/chamados/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    mostrarToast("Ticket atualizado!", "success");
                    fecharModal('modal-chamado');
                    carregarChamados();
                }
            } catch (err) { mostrarToast("Erro ao salvar.", "error"); }
            btn.innerText = "Atualizar Ticket";
        }

        // ================= ROTINAS DE USUÁRIOS =================
        async function carregarUsuarios() {
            try {
                const res = await fetch('/api/usuarios');
                const users = await res.json();
                const tbody = document.querySelector('#tabela-usuarios tbody');
                tbody.innerHTML = '';
                users.forEach(u => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${u.id}</td><td><strong>${u.user}</strong></td><td>${u.perfil}</td><td>${u.equipe}</td>
                            <td><button class="btn-sm btn-delete" onclick="deletarRegistro('/api/usuarios/${u.id}', carregarUsuarios)"><i class="fas fa-trash"></i></button></td>
                        </tr>
                    `;
                });
            } catch (err) {}
        }

        function abrirModalUsuario() {
            document.getElementById('novo-user').value = ''; document.getElementById('novo-senha').value = ''; document.getElementById('novo-equipe').value = '';
            document.getElementById('modal-usuario').style.display = 'flex';
        }

        async function salvarUsuario() {
            const payload = { user: document.getElementById('novo-user').value, senha: document.getElementById('novo-senha').value, perfil: document.getElementById('novo-perfil').value, equipe: document.getElementById('novo-equipe').value.toUpperCase() };
            if(!payload.user || !payload.senha) return mostrarToast("Preencha usuário e senha", "warning");
            
            try {
                const res = await fetch('/api/usuarios', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                if(res.ok){ mostrarToast("Usuário criado!", "success"); fecharModal('modal-usuario'); carregarUsuarios(); }
                else mostrarToast("Usuário já existe.", "error");
            } catch (err) { mostrarToast("Erro", "error"); }
        }

        // ================= ROTINAS DE ANIVERSÁRIOS =================
        async function carregarAniversarios() {
            try {
                const res = await fetch('/api/aniversarios');
                const nivers = await res.json();
                const tbody = document.querySelector('#tabela-aniversarios tbody');
                tbody.innerHTML = '';
                nivers.forEach(n => {
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${n.nome}</strong></td><td>${n.dia.toString().padStart(2,'0')}</td><td>${n.mes.toString().padStart(2,'0')}</td>
                            <td><button class="btn-sm btn-delete" onclick="deletarRegistro('/api/aniversarios/${n.id}', carregarAniversarios)"><i class="fas fa-trash"></i></button></td>
                        </tr>
                    `;
                });
            } catch (err) {}
        }

        function abrirModalNiver() {
            document.getElementById('niver-nome').value = ''; document.getElementById('niver-dia').value = ''; document.getElementById('niver-mes').value = '';
            document.getElementById('modal-niver').style.display = 'flex';
        }

        async function salvarNiver() {
            const payload = { nome: document.getElementById('niver-nome').value, dia: parseInt(document.getElementById('niver-dia').value), mes: parseInt(document.getElementById('niver-mes').value) };
            if(!payload.nome || !payload.dia || !payload.mes) return mostrarToast("Preencha todos os campos", "warning");
            
            try {
                const res = await fetch('/api/aniversarios', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                if(res.ok){ mostrarToast("Aniversário salvo!", "success"); fecharModal('modal-niver'); carregarAniversarios(); }
                else mostrarToast("Erro ao salvar.", "error");
            } catch (err) {}
        }

        // ================= FUNÇÃO COMUM DE EXCLUSÃO =================
        async function deletarRegistro(url, callbackRecarregar) {
            if(confirm("Tem certeza que deseja excluir?")) {
                try {
                    const res = await fetch(url, { method: 'DELETE' });
                    if(res.ok) { mostrarToast("Excluído com sucesso.", "success"); callbackRecarregar(); }
                } catch (err) {}
            }
        }
    </script>
</body>
</html>
