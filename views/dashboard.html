<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GLPI Live</title>
    <link rel="manifest" href="/public/manifest.json">
    <link rel="icon" href="/public/img/REDONDOSIMBOLO 01.png" type="image/png">
    <link rel="apple-touch-icon" href="/public/img/REDONDOSIMBOLO 01.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a2e; color: #fff; display: flex; flex-direction: column; min-height: 100vh; }
        .navbar { background-color: #16213e; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
        .navbar-brand { display: flex; align-items: center; gap: 15px; }
        .navbar-brand img { height: 40px; }
        .user-menu { display: flex; align-items: center; gap: 15px; }
        .btn-notificacao { background: #007AFF; color: #fff; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-notificacao:hover { filter: brightness(1.1); }
        .main-content { padding: 30px 20px; flex: 1; max-width: 1200px; margin: 0 auto; width: 100%; }
        
        /* CARDS DE INDICADORES (NOVIDADE) */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #16213e; padding: 20px; border-radius: 10px; border-left: 5px solid #e94560; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .stat-card h3 { font-size: 12px; color: #a2a2bd; text-transform: uppercase; margin-bottom: 10px; }
        .stat-card .value { font-size: 24px; font-weight: bold; color: #fff; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background-color: #16213e; border-radius: 10px; padding: 30px 20px; text-align: center; text-decoration: none; color: #fff; border: 2px solid transparent; transition: 0.3s; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 150px;}
        .card:hover { border-color: #e94560; transform: translateY(-5px); }
        .card-icon { font-size: 40px; color: #e94560; margin-bottom: 15px; }
        .card-title { font-size: 18px; font-weight: bold; }

        /* TOAST E MEGAFONE */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #fff; color: #333; padding: 15px 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; border-left: 5px solid #e94560; animation: slideIn 0.3s ease forwards; min-width: 300px; font-size: 14px; font-weight: bold;}
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .modal-content { background-color: #fff; padding: 30px; border-radius: 10px; width: 90%; max-width: 500px; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 20px; font-size: 24px; font-weight: bold; color: #aaa; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #333; }
        .form-group textarea, .form-group input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; outline: none; }
        .btn-enviar-push { width: 100%; padding: 12px; background: #f39c12; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <header class="navbar">
        <div class="navbar-brand"><img src="/public/img/REDONDOSIMBOLO 01.png" alt="Logo" onerror="this.style.display='none'"> <span style="font-weight: bold; color: #e94560;">CSC Live</span></div>
        <div class="user-menu">
            <button onclick="solicitarPermissaoNotificacao()" class="btn-notificacao" id="btn-sino"><i class="fas fa-bell"></i> Ativar Alertas</button>
            <a href="/" class="btn-notificacao" style="background: transparent; border: 1px solid #e94560; text-decoration: none;">Sair</a>
        </div>
    </header>

    <main class="main-content">
        <div class="stats-grid">
            <div class="stat-card"><h3>Chamados Pendentes</h3><div class="value" id="stat-pendentes">--</div></div>
            <div class="stat-card"><h3>Membros Ativos</h3><div class="value" id="stat-membros">--</div></div>
            <div class="stat-card" style="grid-column: span 2; border-left-color: #007AFF;"><h3>Próximo Culto Escala</h3><div class="value" id="stat-proximo" style="font-size: 16px;">Carregando...</div></div>
        </div>

        <div class="dashboard-grid" id="grid-modulos">
            <a href="/escalas" class="card"><div class="card-icon"><i class="fas fa-calendar-alt"></i></div><div class="card-title">Gestão de Escalas</div></a>
            <a href="/chamados" class="card"><div class="card-icon"><i class="fas fa-headset"></i></div><div class="card-title">Help Desk & Assistência</div></a>
        </div>
    </main>

    <div id="modal-megafone" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="document.getElementById('modal-megafone').style.display = 'none'">&times;</span>
            <h2 style="color: #f39c12; margin-bottom: 20px;"><i class="fas fa-bullhorn"></i> Enviar Aviso Geral</h2>
            <div class="form-group"><label>Título:</label><input type="text" id="push-titulo" placeholder="Ex: Reunião Urgente"></div>
            <div class="form-group"><label>Mensagem:</label><textarea id="push-msg" rows="4" placeholder="Recado..."></textarea></div>
            <button class="btn-enviar-push" onclick="dispararAvisoManual()">Disparar Notificação</button>
        </div>
    </div>

    <script>
        let usuarioAtual = null;

        function mostrarToast(mensagem, tipo = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast`;
            if(tipo === 'error') toast.style.borderLeftColor = '#dc3545';
            if(tipo === 'warning') toast.style.borderLeftColor = '#ffc107';
            toast.innerHTML = `<div>${mensagem}</div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.animation = 'fadeOut 0.3s forwards'; setTimeout(() => toast.remove(), 300); }, 4000);
        }

        window.onload = async () => {
            const userStore = localStorage.getItem('usuarioLogado');
            if (!userStore) return window.location.href = '/';
            usuarioAtual = JSON.parse(userStore);

            if (Notification.permission === 'granted') document.getElementById('btn-sino').style.display = 'none';

            // Carrega Indicadores
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();
                document.getElementById('stat-pendentes').innerText = stats.pendentes;
                document.getElementById('stat-membros').innerText = stats.membros;
                document.getElementById('stat-proximo').innerText = stats.proximoEvento;
            } catch (e) { console.log("Erro ao carregar estatísticas."); }

            if (usuarioAtual.perfil === 'ADMIN') {
                const megafone = document.createElement('a');
                megafone.href = "#"; megafone.className = "card"; megafone.style.backgroundColor = "#f39c12"; megafone.style.borderColor = "#f39c12";
                megafone.onclick = () => document.getElementById('modal-megafone').style.display = 'flex';
                megafone.innerHTML = `<div class="card-icon" style="color:#fff"><i class="fas fa-bullhorn"></i></div><div class="card-title">Disparar Aviso</div>`;
                document.getElementById('grid-modulos').appendChild(megafone);
            }
        };

        const firebaseConfig = { apiKey: "AIzaSyC63gBQ7JdRTnNCpSpir1brYH754fcKq9M", authDomain: "csc-live-bh.firebaseapp.com", projectId: "csc-live-bh", storageBucket: "csc-live-bh.firebasestorage.app", messagingSenderId: "345272283586", appId: "1:345272283586:web:648c1fb52622792406665b" };
        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        async function solicitarPermissaoNotificacao() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    mostrarToast("Registrando... Aguarde.", "warning");
                    const registration = await navigator.serviceWorker.register('/public/firebase-messaging-sw.js');
                    const token = await messaging.getToken({ vapidKey: "COLE_AQUI_A_SUA_CHAVE_VAPID_GERADA_NO_FIREBASE", serviceWorkerRegistration: registration });
                    
                    if (token) {
                        await fetch('/api/push-token', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ usuario: usuarioAtual.user, token: token }) });
                        mostrarToast("Notificações ativadas!", "success");
                        document.getElementById('btn-sino').style.display = 'none';
                    }
                }
            } catch (error) { mostrarToast("Erro ao ativar.", "error"); }
        }

        messaging.onMessage((payload) => { mostrarToast(`🔔 ${payload.notification.title}: ${payload.notification.body}`, 'success'); });

        async function dispararAvisoManual() {
            const titulo = document.getElementById('push-titulo').value;
            const mensagem = document.getElementById('push-msg').value;
            if(!titulo || !mensagem) return;
            document.querySelector('.btn-enviar-push').innerText = "Enviando...";
            await fetch('/api/notificar', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ titulo, mensagem }) });
            mostrarToast("Aviso enviado!", "success");
            document.getElementById('modal-megafone').style.display = 'none';
            document.querySelector('.btn-enviar-push').innerText = "Disparar Notificação";
        }
    </script>
</body>
</html>
