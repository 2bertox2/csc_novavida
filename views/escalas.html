<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Escalas - CSC Live</title>
    <link rel="icon" href="/public/img/REDONDOSIMBOLO 01.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #121220; color: #fff; padding-bottom: 30px; overflow-x: hidden; }
        
        /* CABEÇALHO COMPACTO */
        .app-header { display: flex; align-items: center; padding: 15px 20px; background-color: #16213e; box-shadow: 0 4px 15px rgba(0,0,0,0.4); position: sticky; top: 0; z-index: 100; gap: 15px; }
        .btn-voltar { color: #a2a2bd; text-decoration: none; font-size: 20px; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05); transition: 0.3s;}
        .btn-voltar:active { transform: scale(0.9); }
        .page-title { font-size: 18px; font-weight: 800; color: #e94560; letter-spacing: 0.5px; margin: 0;}

        .main-container { max-width: 1100px; margin: 20px auto 0; padding: 0 15px; }

        /* PAINEL ADMIN OTIMIZADO */
        .admin-panel { background: #16213e; padding: 20px; border-radius: 16px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); display: none; }
        .panel-heading { font-size: 13px; color: #a2a2bd; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;}
        
        .compact-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap;}
        .compact-row input, .compact-row select { flex: 1; padding: 12px; background: #1a1a2e; color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-weight: bold; outline: none; font-size: 15px; min-width: 150px;}
        .compact-row input:focus { border-color: #007AFF; }
        
        .action-group { display: flex; gap: 10px; flex: 1; min-width: 200px;}
        .btn-action { flex: 1; padding: 12px 15px; border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.3s; text-transform: uppercase; white-space: nowrap;}
        .btn-action:active { transform: scale(0.95); }
        
        .btn-edit { background: #007AFF; }
        .btn-new { background: #e94560; }
        .btn-add { background: #AF52DE; }

        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .action-buttons button { padding: 12px; border: none; border-radius: 8px; color: #fff; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase;}
        .btn-save { background: #28a745; }
        .btn-print { background: #6f42c1; }
        .btn-delete { background: rgba(220, 53, 69, 0.1); color: #dc3545 !important; border: 1px solid #dc3545 !important; grid-column: span 2; display: none;}

        /* TABELA E ÁREA DE CONTEÚDO */
        .content-card { background: #fff; padding: 20px; border-radius: 16px; color: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #titulo-mes { border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px; font-size: 18px; text-align: center; text-transform: uppercase;}
        
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; font-weight: bold; text-transform: uppercase; min-width: 600px; font-size: 13px; }
        th, td { border: 2px solid #000; padding: 10px; text-align: center; vertical-align: middle; }
        th { background: #eee; }
        
        select.select-equipe { width: 100%; padding: 8px; background: #fff; color: #000; border: 1px solid #ccc; border-radius: 4px; font-weight: bold; font-size: 13px; outline: none;}
        textarea { width: 100%; margin-top: 15px; padding: 12px; background: #f9f9f9; color: #333; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; resize: vertical;}

        .btn-del-row { background: transparent; color: #dc3545; border: none; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .btn-del-row:active { transform: scale(0.8); }

        /* CORES DAS EQUIPES */
        .bg-A { background-color: #FF3B30 !important; color: white; } 
        .bg-B { background-color: #007AFF !important; color: white; } 
        .bg-C { background-color: #FFCC00 !important; color: black; } 
        .bg-D { background-color: #34C759 !important; color: white; } 
        .bg-E { background-color: #AF52DE !important; color: white; } 
        .bg-F { background-color: #5856D6 !important; color: white; } 
        .bg-G { background-color: #5AC8FA !important; color: black; } 
        .bg-MISTA { background-color: #FF9500 !important; color: white; }
        
        .mista-checkboxes { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; font-size: 11px; }
        .mista-checkboxes label { background: #f0f0f0; padding: 6px; border-radius: 4px; cursor: pointer; border: 1px solid #ccc; color: #000; }
        
        /* TOAST & MODAL */
        #toast-container { position: fixed; top: 80px; right: 20px; left: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none;}
        .toast { background: #fff; color: #333; padding: 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 12px; border-left: 5px solid #e94560; animation: slideIn 0.3s forwards; font-weight: bold; font-size: 14px; pointer-events: all;}
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center; padding: 20px;}
        .modal-content { background-color: #16213e; padding: 25px; border-radius: 16px; width: 100%; max-width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.1);}
        .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: #fff;}

        /* REGRAS EXCLUSIVAS PARA CELULAR */
        @media (max-width: 768px) {
            .compact-row { flex-direction: column; align-items: stretch; }
            .compact-row input, .compact-row select { width: 100%; }
            .action-group { width: 100%; }
            .action-buttons { grid-template-columns: 1fr; }
            .btn-delete { grid-column: span 1; }
            #dia-extra { max-width: 100% !important; }
        }

        /* MÁGICA DA IMPRESSÃO (PÁGINA ÚNICA) */
        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            body { background: white; padding: 0; zoom: 0.90; overflow: visible;} 
            .app-header, .admin-panel, #toast-container, .btn-exportar, #painel-leitura { display: none !important; }
            .content-card { box-shadow: none; padding: 0; margin: 0; page-break-inside: avoid; }
            .table-responsive { overflow-x: visible; }
            table { width: 100%; font-size: 10px !important; margin-top: 5px; min-width: auto;}
            th, td { padding: 4px !important; border: 1px solid #000; }
            .col-acao, #th-acao { display: none !important; } /* Esconde o botão de excluir na impressão */
            select { appearance: none; border: none; background: transparent !important; color: inherit; font-size: 10px; font-weight: bold;}
            textarea { border: none; outline: none; resize: none; overflow: hidden; font-size: 11px; margin-top: 5px; padding: 0;}
            #feriados-lista, #aniversarios-lista { font-size: 10px; margin-top: 5px; }
            #titulo-mes { font-size: 16px; margin-bottom: 5px; padding-bottom: 5px; }
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <div id="custom-confirm" class="modal">
        <div class="modal-content">
            <h3 style="color:#fff; margin-bottom:10px;"><i class="fas fa-exclamation-triangle" style="color:#dc3545"></i> Atenção</h3>
            <p id="confirm-msg" style="color:#a2a2bd; font-size: 14px;">Deseja realmente continuar?</p>
            <div class="modal-btns">
                <button onclick="document.getElementById('custom-confirm').style.display='none'" style="background: #495057;">Cancelar</button>
                <button id="btn-confirm-yes" style="background: #dc3545;">Sim, Excluir</button>
            </div>
        </div>
    </div>

    <header class="app-header">
        <a href="/dashboard" class="btn-voltar"><i class="fas fa-arrow-left"></i></a>
        <h1 class="page-title">Gestão de Escalas</h1>
    </header>

    <div class="main-container">
        <div class="admin-panel" id="painel-admin">
            <div class="panel-heading"><i class="fas fa-cog"></i> Controles da Escala</div>
            
            <div class="compact-row">
                <input type="month" id="mesAno">
                <div class="action-group">
                    <button onclick="carregarParaEdicao()" class="btn-action btn-edit"><i class="fas fa-pencil-alt"></i> Editar</button>
                    <button onclick="gerarTabelaBase()" class="btn-action btn-new"><i class="fas fa-magic"></i> Nova</button>
                </div>
            </div>

            <div class="compact-row">
                <input type="number" id="dia-extra" placeholder="Dia" min="1" max="31" style="max-width: 80px;">
                <input type="text" id="nome-extra" placeholder="Evento Extra">
                <div class="action-group">
                    <button onclick="adicionarEventoExtra()" class="btn-action btn-add" style="width: 100%;"><i class="fas fa-plus"></i> Inserir</button>
                </div>
            </div>
            
            <div class="action-buttons">
                <button onclick="salvarEscalaNoBanco()" class="btn-save"><i class="fas fa-save"></i> Salvar</button>
                <button onclick="salvarEImprimir()" class="btn-print"><i class="fas fa-print"></i> Salvar & PDF</button>
                <button onclick="solicitarExclusao()" class="btn-delete" id="btn-excluir-admin"><i class="fas fa-trash-alt"></i> Excluir Mês</button>
            </div>
        </div>

        <div class="content-card">
            <div id="painel-leitura" style="display: none; gap: 10px; margin-bottom: 20px;">
                <input type="month" id="mesAnoLeitura" style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
                <button onclick="buscarEscalaSalva()" style="background: #007AFF; color: #fff; border: none; padding: 0 15px; border-radius: 6px; font-weight: bold;"><i class="fas fa-search"></i> Buscar</button>
            </div>

            <h2 id="titulo-mes">SELECIONE UM MÊS NO PAINEL</h2>
            
            <div class="table-responsive">
                <table id="tabela-escala">
                    <thead>
                        <tr>
                            <th>DIA DA SEMANA / EVENTO</th>
                            <th>DIA</th>
                            <th>RESPONSÁVEL / EQUIPE</th>
                            <th>MEMBROS ESCALADOS</th>
                            <th id="th-acao" class="col-acao" style="display: none;">AÇÃO</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela"></tbody>
                </table>
            </div>
            
            <div id="feriados-lista" style="margin-top: 15px; font-weight: bold; color: #dc3545; font-size: 13px;"></div>
            <div id="aniversarios-lista" style="margin-top: 5px; font-weight: bold; color: #007AFF; font-size: 13px;"></div>
            
            <textarea id="obs-geral" rows="3" placeholder="Observações Gerais da Escala (Avisos, reuniões, etc.)"></textarea>
            
            <button onclick="window.print()" style="width: 100%; padding: 14px; background: #17a2b8; color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; display: none;" id="btn-imprimir"><i class="fas fa-print"></i> IMPRIMIR PDF</button>
        </div>
    </div>

    <script>
        const equipesDB = { "A": ["CARLOS", "AUGUSTO", "DANIEL"], "B": ["SÉRGIO", "DAVI", "BENVINDO", "CARLOS RODRIGUES"], "C": ["WALLERSON", "WALLYSON", "JOSÉ", "EDUARDO", "MATEUS"], "D": ["LUIZ", "JUNINHO"], "E": ["MARCOS", "BINHO", "RODRIGO BOTELHO", "VICTOR"], "F": ["PISKE", "ISABELA", "PETERSON"], "G": ["JUNINHO", "AUGUSTO", "DAVI", "JOSÉ", "VICTOR"] };
        const feriados2026 = { "0-1": "Confraternização Universal", "1-17": "Carnaval", "3-3": "Sexta-feira Santa", "3-5": "Páscoa", "3-21": "Tiradentes", "4-1": "Dia do Trabalho", "5-4": "Corpus Christi", "8-7": "Independência", "9-12": "Nossa Sra Aparecida", "10-2": "Finados", "10-15": "Proclamação da República", "11-25": "Natal" };

        let usuarioAtual = null;
        let isEdicao = false; // Controle para saber qual mensagem exibir ao salvar

        function mostrarToast(mensagem, tipo = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast`;
            let icon = '✅'; if(tipo==='warning') {icon='⚠️'; toast.style.borderLeftColor='#f39c12';} if(tipo==='error') {icon='❌'; toast.style.borderLeftColor='#dc3545';}
            toast.innerHTML = `${icon} <span style="margin-left:8px;">${mensagem}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.animation = 'fadeOut 0.3s forwards'; setTimeout(() => toast.remove(), 300); }, 3500);
        }

        window.onload = () => {
            const userStore = localStorage.getItem('usuarioLogado');
            if (!userStore) return window.location.href = '/';
            usuarioAtual = JSON.parse(userStore);

            if (usuarioAtual.perfil === 'ADMIN') {
                document.getElementById('painel-admin').style.display = 'block';
                document.getElementById('mesAno').value = getMesAtual();
            } else {
                document.getElementById('painel-leitura').style.display = 'flex';
                document.getElementById('mesAnoLeitura').value = getMesAtual();
                document.getElementById('obs-geral').setAttribute('readonly', 'true');
                buscarEscalaSalva();
            }
        };

        function getMesAtual() {
            const hj = new Date(); return `${hj.getFullYear()}-${(hj.getMonth() + 1).toString().padStart(2, '0')}`;
        }

        async function preencherDatasEspeciais(mesNumero) {
            const listaF = document.getElementById('feriados-lista'); const listaA = document.getElementById('aniversarios-lista');
            listaF.innerHTML = ''; listaA.innerHTML = '';
            const diasMes = new Date(2026, mesNumero, 0).getDate();
            for(let d=1; d<=diasMes; d++) if(feriados2026[`${mesNumero-1}-${d}`]) listaF.innerHTML += `🔴 FERIADO NACIONAL: ${d.toString().padStart(2, '0')}/${mesNumero.toString().padStart(2, '0')} - ${feriados2026[`${mesNumero-1}-${d}`]}<br>`;
            try {
                const res = await fetch('/api/aniversarios');
                const todos = await res.json();
                todos.filter(a => a.mes === mesNumero).forEach(n => { listaA.innerHTML += `🎉 ANIVERSÁRIO: ${n.dia.toString().padStart(2, '0')}/${n.mes.toString().padStart(2, '0')} - ${n.nome}<br>`; });
            } catch (err) {}
        }

        async function gerarTabelaBase() {
            const val = document.getElementById('mesAno').value;
            if(!val) return mostrarToast("Selecione o mês.", "warning");
            
            isEdicao = false; // Define como uma escala Nova
            document.getElementById('th-acao').style.display = 'table-cell'; // Mostra a coluna de Excluir
            
            const [ano, mes] = val.split('-').map(Number);
            document.getElementById('titulo-mes').innerText = `${new Date(ano, mes-1).toLocaleString('pt-br', {month: 'long'}).toUpperCase()} / ${ano}`;
            const tbody = document.getElementById('corpo-tabela'); tbody.innerHTML = ''; document.getElementById('obs-geral').value = '';
            const diasMes = new Date(ano, mes, 0).getDate();
            for(let d=1; d<=diasMes; d++) {
                const ds = new Date(ano, mes-1, d).getDay();
                if(ds === 0) { criarLinhaTr("DOMINGO MANHÃ", d); criarLinhaTr("DOMINGO NOITE", d); }
                else if(ds === 4) criarLinhaTr("QUINTA", d);
                else if(ds === 6) criarLinhaTr("SÁBADO", d);
            }
            await preencherDatasEspeciais(mes);
            document.getElementById('btn-imprimir').style.display = 'block';
            document.getElementById('btn-excluir-admin').style.display = 'none';
        }

        function criarLinhaTr(evento, dia) {
            const tr = document.createElement('tr');
            let opts = '<option value="">---</option>'; 
            
            // Agora o dropdown mostra: EQUIPE A (CARLOS)
            for(let e in equipesDB) {
                opts += `<option value="${e}">EQUIPE ${e} (${equipesDB[e][0]})</option>`;
            }
            opts += `<option value="MISTA">ESCALA MISTA</option>`;
            
            tr.innerHTML = `
                <td>${evento}</td>
                <td>${dia}</td>
                <td><select class="select-equipe" onchange="tratarSelecaoEquipe(this)">${opts}</select></td>
                <td class="membros-td">-</td>
                <td class="col-acao"><button class="btn-del-row" onclick="this.closest('tr').remove()" title="Remover este dia"><i class="fas fa-times-circle"></i></button></td>
            `;
            document.getElementById('corpo-tabela').appendChild(tr);
        }

        function adicionarEventoExtra() {
            const dia = parseInt(document.getElementById('dia-extra').value), nome = document.getElementById('nome-extra').value.toUpperCase();
            if(!dia || !nome) return mostrarToast("Preencha o dia e o nome.", "warning");
            criarLinhaTr(nome, dia);
            const tbody = document.getElementById('corpo-tabela');
            const rows = Array.from(tbody.rows);
            rows.sort((a, b) => parseInt(a.cells[1].innerText) - parseInt(b.cells[1].innerText));
            rows.forEach(r => tbody.appendChild(r));
            document.getElementById('dia-extra').value = '';
            document.getElementById('nome-extra').value = '';
        }

        function tratarSelecaoEquipe(select) {
            const tr = select.closest('tr'), valor = select.value, tdMembros = tr.querySelector('.membros-td');
            tr.className = valor ? `bg-${valor}` : '';
            if (valor === 'MISTA') {
                tdMembros.innerHTML = `<div class="mista-checkboxes"><label><input type="checkbox" value="A"> A</label><label><input type="checkbox" value="B"> B</label><label><input type="checkbox" value="C"> C</label><label><input type="checkbox" value="D"> D</label><label><input type="checkbox" value="E"> E</label><label><input type="checkbox" value="G"> G</label></div><small style="display:block; margin-top:5px; color:#000;">Sorteio ocorre ao salvar.</small>`;
            } else if (valor !== "") tdMembros.innerText = equipesDB[valor].join(', ');
            else tdMembros.innerText = "-";
        }

        async function carregarParaEdicao() {
            const mesAno = document.getElementById('mesAno').value;
            if(!mesAno) return mostrarToast("Selecione o mês para editar.", "warning");
            const [ano, mes] = mesAno.split('-').map(Number);
            try {
                const res = await fetch(`/api/escalas/${mesAno}`);
                const result = await res.json();
                if (result.sucesso) {
                    isEdicao = true; // Define como uma escala Sendo Editada
                    document.getElementById('th-acao').style.display = 'table-cell'; // Mostra a coluna de Excluir
                    
                    const dados = result.dados;
                    document.getElementById('titulo-mes').innerText = dados.titulo;
                    document.getElementById('obs-geral').value = dados.obs || "";
                    const tbody = document.getElementById('corpo-tabela'); tbody.innerHTML = '';
                    dados.linhas.forEach(linha => {
                        const tr = document.createElement('tr');
                        tr.className = linha.equipe ? `bg-${linha.equipe}` : '';
                        let opts = '<option value="">---</option>';
                        
                        for(let e in equipesDB) {
                            opts += `<option value="${e}" ${linha.equipe === e ? 'selected' : ''}>EQUIPE ${e} (${equipesDB[e][0]})</option>`;
                        }
                        opts += `<option value="MISTA" ${linha.equipe === 'MISTA' ? 'selected' : ''}>ESCALA MISTA</option>`;
                        
                        tr.innerHTML = `
                            <td>${linha.evento}</td>
                            <td>${linha.dia}</td>
                            <td><select class="select-equipe" onchange="tratarSelecaoEquipe(this)">${opts}</select></td>
                            <td class="membros-td">${linha.membros}</td>
                            <td class="col-acao"><button class="btn-del-row" onclick="this.closest('tr').remove()" title="Remover este dia"><i class="fas fa-times-circle"></i></button></td>
                        `;
                        tbody.appendChild(tr);
                        if (linha.equipe === 'MISTA') {
                            tr.querySelector('.select-equipe').style.display = 'none';
                            tr.cells[2].innerHTML += ` <strong>MISTA</strong><br><button onclick="destravarMista(this)" style="font-size:10px; padding:6px; margin-top:5px; background:#333; color:#fff; border:none; width:100%; border-radius:4px;">Editar</button>`;
                        }
                    });
                    await preencherDatasEspeciais(mes);
                    document.getElementById('btn-imprimir').style.display = 'block';
                    document.getElementById('btn-excluir-admin').style.display = 'block';
                    mostrarToast("Escala carregada com sucesso para edição.", "success");
                } else mostrarToast("Nenhuma escala salva para este mês.", "warning");
            } catch (err) { mostrarToast("Erro no servidor ao carregar.", "error"); }
        }

        function destravarMista(btn) {
            const tr = btn.closest('tr');
            
            let optsHtml = `<option value="">---</option>`;
            for(let e in equipesDB) {
                optsHtml += `<option value="${e}">EQUIPE ${e} (${equipesDB[e][0]})</option>`;
            }
            optsHtml += `<option value="MISTA" selected>ESCALA MISTA</option>`;
            
            tr.cells[2].innerHTML = `<select class="select-equipe" onchange="tratarSelecaoEquipe(this)">${optsHtml}</select>`;
            tratarSelecaoEquipe(tr.querySelector('.select-equipe'));
        }

        async function salvarEscalaNoBanco(isSilent = false) {
            const mesAno = document.getElementById('mesAno').value;
            if(!mesAno) { mostrarToast("Selecione o mês.", "warning"); return false; }
            const tbody = document.getElementById('corpo-tabela');
            if(tbody.rows.length === 0) { mostrarToast("Gere a tabela primeiro.", "warning"); return false; }
            
            const dadosEscala = [];
            for (let i = 0; i < tbody.rows.length; i++) {
                const tr = tbody.rows[i], evento = tr.cells[0].innerText, dia = tr.cells[1].innerText;
                const select = tr.querySelector('.select-equipe');
                let valorEquipe = select ? select.value : 'MISTA', membrosFinais = tr.querySelector('.membros-td').innerText;

                if (select && valorEquipe === 'MISTA') {
                    const checkboxes = Array.from(tr.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
                    if (checkboxes.length < 2) { mostrarToast(`Dia ${dia}: selecione min 2 equipes!`, "error"); return false; }
                    let sorteados = [], poolPorEquipe = {};
                    checkboxes.forEach(e => poolPorEquipe[e] = equipesDB[e].filter(m => m !== "DANIEL"));
                    checkboxes.forEach(e => {
                        if (sorteados.length < 3 && poolPorEquipe[e].length > 0) {
                            let idx = Math.floor(Math.random() * poolPorEquipe[e].length);
                            sorteados.push(`${poolPorEquipe[e].splice(idx, 1)[0]} (Eq.${e})`);
                        }
                    });
                    if (sorteados.length < 3) {
                        let poolRestante = [];
                        for (let e in poolPorEquipe) poolPorEquipe[e].forEach(m => poolRestante.push(`${m} (Eq.${e})`));
                        while(sorteados.length < 3 && poolRestante.length > 0) {
                            let idx = Math.floor(Math.random() * poolRestante.length);
                            sorteados.push(poolRestante.splice(idx, 1)[0]);
                        }
                    }
                    membrosFinais = sorteados.join(' | ');
                    tr.querySelector('.membros-td').innerText = membrosFinais;
                    select.style.display = 'none'; 
                    tr.cells[2].innerHTML = `<strong>ESCALA MISTA</strong>`;
                }
                dadosEscala.push({ evento, dia, equipe: valorEquipe, membros: membrosFinais });
            }

            const pacote = { titulo: document.getElementById('titulo-mes').innerText, obs: document.getElementById('obs-geral').value, linhas: dadosEscala };
            try {
                const response = await fetch('/api/escalas', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mesAno, dados: pacote }) });
                if (response.ok) { 
                    if(!isSilent) {
                        const msgFinal = isEdicao ? "Escala atualizada e equipe notificada!" : "Nova escala salva e equipe notificada!";
                        mostrarToast(msgFinal, "success"); 
                    }
                    document.getElementById('btn-excluir-admin').style.display = 'block'; 
                    isEdicao = true; // Após salvar, o documento atual passa a ser uma edição
                    return true;
                }
            } catch (err) { mostrarToast("Erro ao salvar no banco.", "error"); return false; }
        }

        async function salvarEImprimir() {
            const sucesso = await salvarEscalaNoBanco(true);
            if (sucesso) {
                mostrarToast("Tudo salvo! Abrindo área de impressão...", "success");
                setTimeout(() => { window.print(); }, 800);
            }
        }

        function solicitarExclusao() {
            const mesAno = document.getElementById('mesAno').value;
            if(!mesAno) return;
            document.getElementById('confirm-msg').innerText = `Isto irá apagar permanentemente a escala de ${mesAno}. Deseja continuar?`;
            document.getElementById('custom-confirm').style.display = 'flex';
            document.getElementById('btn-confirm-yes').onclick = async () => {
                document.getElementById('custom-confirm').style.display = 'none';
                try {
                    const response = await fetch(`/api/escalas/${mesAno}`, { method: 'DELETE' });
                    if (response.ok) {
                        mostrarToast("Escala excluída do sistema com sucesso.", "success");
                        document.getElementById('corpo-tabela').innerHTML = ''; document.getElementById('feriados-lista').innerHTML = ''; document.getElementById('aniversarios-lista').innerHTML = ''; document.getElementById('obs-geral').value = '';
                        document.getElementById('btn-imprimir').style.display = 'none'; document.getElementById('btn-excluir-admin').style.display = 'none';
                        document.getElementById('th-acao').style.display = 'none';
                    }
                } catch (err) {}
            };
        }

        async function buscarEscalaSalva() {
            const mesAno = document.getElementById('mesAnoLeitura').value || getMesAtual();
            if(!mesAno) return;
            const [ano, mes] = mesAno.split('-').map(Number);
            try {
                const response = await fetch(`/api/escalas/${mesAno}`);
                const result = await response.json();
                if (result.sucesso) {
                    document.getElementById('th-acao').style.display = 'none'; // Esconde a coluna de Ação na visualização
                    
                    const dados = result.dados;
                    document.getElementById('titulo-mes').innerText = dados.titulo;
                    document.getElementById('obs-geral').value = dados.obs || "";
                    const tbody = document.getElementById('corpo-tabela'); tbody.innerHTML = '';
                    dados.linhas.forEach(linha => {
                        const tr = document.createElement('tr');
                        tr.className = linha.equipe ? `bg-${linha.equipe}` : '';
                        tr.innerHTML = `
                            <td>${linha.evento}</td>
                            <td>${linha.dia}</td>
                            <td><strong>${linha.equipe === 'MISTA' ? 'ESCALA MISTA' : (linha.equipe ? 'EQUIPE ' + linha.equipe : '---')}</strong></td>
                            <td>${linha.membros}</td>
                            <td class="col-acao" style="display: none;"></td>
                        `;
                        tbody.appendChild(tr);
                    });
                    await preencherDatasEspeciais(mes);
                    document.getElementById('btn-imprimir').style.display = 'block';
                } else mostrarToast("Nenhuma escala encontrada para este mês no momento.", "warning");
            } catch (err) {}
        }
    </script>
</body>
</html>
