<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Escalas - GLPI Live</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #1a1a2e; color: #fff; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto 20px; }
        .btn-voltar { color: #a2a2bd; text-decoration: none; border: 1px solid #a2a2bd; padding: 8px 15px; border-radius: 5px; font-weight: bold; }
        
        .admin-panel { background: #16213e; padding: 20px; border-radius: 10px; max-width: 1100px; margin: 0 auto 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); display: none; }
        .input-group { background: #1a1a2e; padding: 15px; border-radius: 8px; border: 1px solid #0f3460; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        input, select, textarea { padding: 10px; background: #16213e; color: #fff; border: 1px solid #0f3460; border-radius: 5px; font-weight: bold; }
        button { padding: 10px 20px; background: #e94560; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #d13d56; }

        .table-container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; color: #000; }
        table { width: 100%; border-collapse: collapse; font-weight: bold; text-transform: uppercase; margin-top: 15px; }
        th, td { border: 2px solid #000; padding: 10px; text-align: center; vertical-align: middle; }
        th { background: #eee; }

        .bg-A { background-color: #FF3B30 !important; color: white; } 
        .bg-B { background-color: #007AFF !important; color: white; } 
        .bg-C { background-color: #FFCC00 !important; color: black; } 
        .bg-D { background-color: #34C759 !important; color: white; } 
        .bg-E { background-color: #AF52DE !important; color: white; } 
        .bg-F { background-color: #5856D6 !important; color: white; } 
        .bg-G { background-color: #5AC8FA !important; color: black; } 
        .bg-MISTA { background-color: #FF9500 !important; color: white; }

        .mista-checkboxes { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; font-size: 12px; }
        .mista-checkboxes label { background: #f0f0f0; padding: 4px 8px; border-radius: 4px; cursor: pointer; border: 1px solid #ccc; color: #000; }

        .btn-salvar-db { background: #28a745; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-excluir { background: #dc3545; width: 100%; font-size: 16px; margin-top: 10px; display: none; }
        .btn-exportar { background: #17a2b8; width: 100%; font-size: 16px; margin-top: 10px; display: none; }
        textarea { width: 100%; margin-top: 10px; background: #f9f9f9; color: #333; border: 1px solid #ccc; }

        @media print {
            body { background: white; padding: 0; }
            .admin-panel, .btn-voltar, .header h1, .btn-exportar, #painel-leitura, .btn-excluir { display: none !important; }
            .table-container { box-shadow: none; padding: 0; }
            select { appearance: none; border: none; background: transparent !important; color: inherit; font-size: 14px; }
            * { -webkit-print-color-adjust: exact !important; color-adjust: exact !important; }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="/dashboard" class="btn-voltar">⬅ Voltar ao Dashboard</a>
        <h1 style="color: #e94560;">ESCALAS - <span id="nome-usuario-topo"></span></h1>
    </div>

    <div class="admin-panel" id="painel-admin">
        <div class="input-group">
            <label>1. Selecione o Mês:</label>
            <input type="month" id="mesAno">
            <button onclick="carregarParaEdicao()" style="background: #007AFF;">✏️ Carregar / Editar Escala</button>
            <button onclick="gerarTabelaBase()">Construir Nova Estrutura</button>
        </div>
        <div class="input-group">
            <label>2. Adicionar Evento Extra (Ex: Sexta-Vigília):</label>
            <input type="number" id="dia-extra" placeholder="Dia" style="width: 70px;" min="1" max="31">
            <input type="text" id="nome-extra" placeholder="Nome do Evento" style="width: 200px;">
            <button onclick="adicionarEventoExtra()" style="background: #AF52DE;">Inserir</button>
        </div>
        <button onclick="salvarEscalaNoBanco()" class="btn-salvar-db">💾 Salvar Escala no Banco</button>
        <button onclick="excluirEscala()" class="btn-excluir" id="btn-excluir-admin">🗑️ Excluir Escala Oficial</button>
    </div>

    <div class="table-container" id="escala-print">
        <div class="input-group" id="painel-leitura" style="background: #f4f4f4; border: 1px solid #ddd; display: none;">
            <label style="color: #000;">Visualizar Mês:</label>
            <input type="month" id="mesAnoLeitura" style="background: #fff; color: #000; border: 1px solid #ccc;">
            <button onclick="buscarEscalaSalva()" style="background: #007AFF;">Buscar Escala</button>
        </div>

        <h2 id="titulo-mes" style="border-bottom: 2px solid #000; padding-bottom: 10px;">SELECIONE UM MÊS</h2>
        <table id="tabela-escala">
            <thead>
                <tr>
                    <th>DIA DA SEMANA / EVENTO</th>
                    <th>DIA</th>
                    <th>RESPONSÁVEL / EQUIPE</th>
                    <th>MEMBROS ESCALADOS</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela">
                </tbody>
        </table>
        <div id="feriados-lista" style="margin-top: 15px; font-weight: bold; color: #dc3545; font-size: 14px;"></div>
        <textarea id="obs-geral" rows="4" placeholder="Observações Gerais (Preenchido pelo Admin)"></textarea>
        <button onclick="window.print()" class="btn-exportar" id="btn-imprimir">🖨️ EXPORTAR PDF / IMPRIMIR</button>
    </div>

    <script>
        const equipesDB = {
            "A": ["CARLOS", "AUGUSTO", "DANIEL"],
            "B": ["SÉRGIO", "DAVI", "BENVINDO"],
            "C": ["WALLERSON", "WALLYSON", "JOSÉ", "EDUARDO", "MATEUS"],
            "D": ["LUIZ", "JUNINHO"],
            "E": ["MARCOS", "BINHO", "RODRIGO BOTELHO", "VICTOR"],
            "F": ["PISKE", "ISABELA", "PETERSON"],
            "G": ["JUNINHO", "AUGUSTO", "DAVI"]
        };

        const feriados2026 = {
            "0-1": "Confraternização Universal", "1-17": "Carnaval", "3-3": "Sexta-feira Santa",
            "3-5": "Páscoa", "3-21": "Tiradentes", "4-1": "Dia do Trabalho", "5-4": "Corpus Christi",
            "8-7": "Independência", "9-12": "Nossa Sra Aparecida", "10-2": "Finados",
            "10-15": "Proclamação da República", "11-25": "Natal"
        };

        let usuarioAtual = null;

        window.onload = () => {
            const userStore = localStorage.getItem('usuarioLogado');
            if (!userStore) {
                window.location.href = '/';
                return;
            }
            usuarioAtual = JSON.parse(userStore);
            document.getElementById('nome-usuario-topo').innerText = `PERFIL: ${usuarioAtual.perfil}`;

            if (usuarioAtual.perfil === 'ADMIN') {
                document.getElementById('painel-admin').style.display = 'block';
                document.getElementById('mesAno').value = getMesAtual();
            } else {
                document.getElementById('painel-leitura').style.display = 'flex';
                document.getElementById('mesAnoLeitura').value = getMesAtual();
                document.getElementById('obs-geral').setAttribute('readonly', 'true');
                buscarEscalaSalva(getMesAtual());
            }
        };

        function getMesAtual() {
            const hj = new Date();
            return `${hj.getFullYear()}-${(hj.getMonth() + 1).toString().padStart(2, '0')}`;
        }

        // Gera a estrutura do zero, apagando tudo da tela
        function gerarTabelaBase() {
            const val = document.getElementById('mesAno').value;
            if(!val) return alert("Selecione o mês!");
            const [ano, mes] = val.split('-').map(Number);
            
            document.getElementById('titulo-mes').innerText = `${new Date(ano, mes-1).toLocaleString('pt-br', {month: 'long'}).toUpperCase()} / ${ano}`;
            const tbody = document.getElementById('corpo-tabela');
            const listaF = document.getElementById('feriados-lista');
            tbody.innerHTML = ''; listaF.innerHTML = '';
            document.getElementById('obs-geral').value = '';
            
            const diasMes = new Date(ano, mes, 0).getDate();
            for(let d=1; d<=diasMes; d++) {
                const ds = new Date(ano, mes-1, d).getDay();
                if(ds === 0) { criarLinhaTr("DOMINGO MANHÃ", d); criarLinhaTr("DOMINGO NOITE", d); }
                else if(ds === 4) criarLinhaTr("QUINTA", d);
                else if(ds === 6) criarLinhaTr("SÁBADO", d);
                
                if(feriados2026[`${mes-1}-${d}`]) listaF.innerHTML += `FERIADO NACIONAL: ${d}/${mes.toString().padStart(2, '0')} - ${feriados2026[`${mes-1}-${d}`]}<br>`;
            }
            document.getElementById('btn-imprimir').style.display = 'block';
            document.getElementById('btn-excluir-admin').style.display = 'none';
        }

        // CARREGAR PARA EDIÇÃO (ADMIN)
        async function carregarParaEdicao() {
            const mesAno = document.getElementById('mesAno').value;
            if(!mesAno) return alert("Selecione o mês para carregar.");

            try {
                const response = await fetch(`/api/escalas/${mesAno}`);
                const result = await response.json();
                
                if (result.sucesso) {
                    const dados = result.dados;
                    document.getElementById('titulo-mes').innerText = dados.titulo;
                    document.getElementById('feriados-lista').innerHTML = dados.feriados;
                    document.getElementById('obs-geral').value = dados.obs || "";
                    
                    const tbody = document.getElementById('corpo-tabela');
                    tbody.innerHTML = '';
                    
                    dados.linhas.forEach(linha => {
                        const tr = document.createElement('tr');
                        tr.className = linha.equipe ? `bg-${linha.equipe}` : '';
                        
                        let optionsHTML = '<option value="">---</option>';
                        for(let e in equipesDB) {
                            const isSelected = (linha.equipe === e) ? 'selected' : '';
                            optionsHTML += `<option value="${e}" ${isSelected}>EQUIPE ${e}</option>`;
                        }
                        const isMista = (linha.equipe === 'MISTA') ? 'selected' : '';
                        optionsHTML += `<option value="MISTA" ${isMista}>ESCALA MISTA</option>`;

                        tr.innerHTML = `
                            <td>${linha.evento}</td>
                            <td>${linha.dia}</td>
                            <td>
                                <select class="select-equipe" onchange="tratarSelecaoEquipe(this)">${optionsHTML}</select>
                            </td>
                            <td class="membros-td">${linha.membros}</td>
                        `;
                        tbody.appendChild(tr);

                        if (linha.equipe === 'MISTA') {
                            const select = tr.querySelector('.select-equipe');
                            select.style.display = 'none';
                            tr.cells[2].innerHTML += ` <strong>MISTA (Carregada)</strong><br><button onclick="destravarMista(this)" style="font-size:10px; padding:2px 5px; margin-top:5px; background:#333;">Editar Sorteio</button>`;
                        }
                    });

                    document.getElementById('btn-imprimir').style.display = 'block';
                    document.getElementById('btn-excluir-admin').style.display = 'block';
                    alert("Escala carregada e pronta para edição.");
                } else {
                    alert("Nenhuma escala salva para este mês. Você pode gerar uma nova estrutura.");
                }
            } catch (err) {
                console.error("Erro na busca para edição:", err);
            }
        }

        function destravarMista(btn) {
            const tr = btn.closest('tr');
            tr.cells[2].innerHTML = `
                <select class="select-equipe" onchange="tratarSelecaoEquipe(this)">
                    <option value="">---</option>
                    <option value="A">EQUIPE A</option>
                    <option value="B">EQUIPE B</option>
                    <option value="C">EQUIPE C</option>
                    <option value="D">EQUIPE D</option>
                    <option value="E">EQUIPE E</option>
                    <option value="F">EQUIPE F</option>
                    <option value="G">EQUIPE G</option>
                    <option value="MISTA" selected>ESCALA MISTA</option>
                </select>`;
            tratarSelecaoEquipe(tr.querySelector('.select-equipe'));
        }

        function adicionarEventoExtra() {
            const dia = parseInt(document.getElementById('dia-extra').value);
            const nome = document.getElementById('nome-extra').value.toUpperCase();
            if(!dia || !nome) return alert("Preencha o dia e o nome do evento.");
            criarLinhaTr(nome, dia);
            
            const tbody = document.getElementById('corpo-tabela');
            const rows = Array.from(tbody.rows);
            rows.sort((a, b) => parseInt(a.cells[1].innerText) - parseInt(b.cells[1].innerText));
            rows.forEach(r => tbody.appendChild(r));
        }

        function criarLinhaTr(evento, dia) {
            const tr = document.createElement('tr');
            let optionsHTML = '<option value="">---</option>';
            for(let e in equipesDB) optionsHTML += `<option value="${e}">EQUIPE ${e}</option>`;
            optionsHTML += `<option value="MISTA">ESCALA MISTA</option>`;

            tr.innerHTML = `
                <td>${evento}</td>
                <td>${dia}</td>
                <td><select class="select-equipe" onchange="tratarSelecaoEquipe(this)">${optionsHTML}</select></td>
                <td class="membros-td">-</td>
            `;
            document.getElementById('corpo-tabela').appendChild(tr);
        }

        function tratarSelecaoEquipe(select) {
            const tr = select.closest('tr');
            const valor = select.value;
            const tdMembros = tr.querySelector('.membros-td');
            
            tr.className = valor ? `bg-${valor}` : '';

            if (valor === 'MISTA') {
                tdMembros.innerHTML = `
                    <div class="mista-checkboxes">
                        <label><input type="checkbox" value="A"> A</label>
                        <label><input type="checkbox" value="B"> B</label>
                        <label><input type="checkbox" value="C"> C</label>
                        <label><input type="checkbox" value="D"> D</label>
                        <label><input type="checkbox" value="E"> E</label>
                        <label><input type="checkbox" value="G"> G</label>
                    </div>
                    <small style="display:block; margin-top:5px; color:#000;">Marque as equipes. O sorteio (1 de cada) ocorre ao salvar.</small>
                `;
            } else if (valor !== "") {
                tdMembros.innerText = equipesDB[valor].join(', ');
            } else {
                tdMembros.innerText = "-";
            }
        }

        async function salvarEscalaNoBanco() {
            const mesAno = document.getElementById('mesAno').value;
            if(!mesAno) return alert("Selecione o mês base primeiro.");

            const tbody = document.getElementById('corpo-tabela');
            if(tbody.rows.length === 0) return alert("A tabela está vazia. Gere o mês antes de salvar.");

            const dadosEscala = [];

            for (let i = 0; i < tbody.rows.length; i++) {
                const tr = tbody.rows[i];
                const evento = tr.cells[0].innerText;
                const dia = tr.cells[1].innerText;
                const select = tr.querySelector('.select-equipe');
                let valorEquipe = select ? select.value : 'MISTA'; // Se não tem select, é MISTA travada
                let membrosFinais = tr.querySelector('.membros-td').innerText;

                if (select && valorEquipe === 'MISTA') {
                    const checkboxes = Array.from(tr.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
                    if (checkboxes.length < 2) {
                        alert(`A Escala Mista do dia ${dia} precisa de pelo menos 2 equipes selecionadas!`);
                        return;
                    }
                    
                    let sorteados = [];
                    let poolPorEquipe = {};
                    checkboxes.forEach(e => {
                        poolPorEquipe[e] = equipesDB[e].filter(m => m !== "DANIEL"); 
                    });

                    checkboxes.forEach(e => {
                        if (sorteados.length < 3 && poolPorEquipe[e].length > 0) {
                            let idx = Math.floor(Math.random() * poolPorEquipe[e].length);
                            let escolhido = poolPorEquipe[e].splice(idx, 1)[0];
                            sorteados.push(`${escolhido} (Eq.${e})`);
                        }
                    });

                    if (sorteados.length < 3) {
                        let poolRestante = [];
                        for (let e in poolPorEquipe) {
                            poolPorEquipe[e].forEach(m => poolRestante.push(`${m} (Eq.${e})`));
                        }
                        while(sorteados.length < 3 && poolRestante.length > 0) {
                            let idx = Math.floor(Math.random() * poolRestante.length);
                            sorteados.push(poolRestante.splice(idx, 1)[0]);
                        }
                    }

                    membrosFinais = sorteados.join(' | ');
                    
                    tr.querySelector('.membros-td').innerText = membrosFinais;
                    select.style.display = 'none'; 
                    tr.cells[2].innerHTML = `<strong>ESCALA MISTA</strong>`;
                }

                dadosEscala.push({ evento, dia, equipe: valorEquipe, membros: membrosFinais });
            }

            const pacote = {
                titulo: document.getElementById('titulo-mes').innerText,
                feriados: document.getElementById('feriados-lista').innerHTML,
                obs: document.getElementById('obs-geral').value,
                linhas: dadosEscala
            };

            try {
                const response = await fetch('/api/escalas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mesAno: mesAno, dados: pacote })
                });
                
                if (response.ok) {
                    alert("✅ Escala salva no banco de dados com sucesso!");
                    document.getElementById('btn-excluir-admin').style.display = 'block';
                }
            } catch (err) {
                console.error("Erro ao salvar:", err);
            }
        }

        // ROTA PARA EXCLUIR ESCALA (ADMIN)
        async function excluirEscala() {
            const mesAno = document.getElementById('mesAno').value;
            if(!mesAno) return;
            
            if(!confirm("⚠️ Tem certeza que deseja excluir toda a escala deste mês do banco de dados?")) return;

            try {
                const response = await fetch(`/api/escalas/${mesAno}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    alert("🗑️ Escala excluída com sucesso.");
                    document.getElementById('corpo-tabela').innerHTML = '';
                    document.getElementById('feriados-lista').innerHTML = '';
                    document.getElementById('obs-geral').value = '';
                    document.getElementById('titulo-mes').innerText = 'SELECIONE UM MÊS';
                    document.getElementById('btn-imprimir').style.display = 'none';
                    document.getElementById('btn-excluir-admin').style.display = 'none';
                } else {
                    alert("Erro ao excluir a escala.");
                }
            } catch (err) {
                console.error("Erro na exclusão:", err);
            }
        }

        // LEITURA PARA MEMBROS E LIDERES
        async function buscarEscalaSalva(mesParam = null) {
            const mesAno = mesParam || document.getElementById('mesAnoLeitura').value;
            if(!mesAno) return;

            try {
                const response = await fetch(`/api/escalas/${mesAno}`);
                const result = await response.json();
                
                if (result.sucesso) {
                    const dados = result.dados;
                    document.getElementById('titulo-mes').innerText = dados.titulo;
                    document.getElementById('feriados-lista').innerHTML = dados.feriados;
                    document.getElementById('obs-geral').value = dados.obs || "";
                    
                    const tbody = document.getElementById('corpo-tabela');
                    tbody.innerHTML = '';
                    
                    dados.linhas.forEach(linha => {
                        const tr = document.createElement('tr');
                        tr.className = linha.equipe ? `bg-${linha.equipe}` : '';
                        tr.innerHTML = `
                            <td>${linha.evento}</td>
                            <td>${linha.dia}</td>
                            <td><strong>${linha.equipe === 'MISTA' ? 'ESCALA MISTA' : (linha.equipe ? 'EQUIPE ' + linha.equipe : '---')}</strong></td>
                            <td>${linha.membros}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                    document.getElementById('btn-imprimir').style.display = 'block';
                } else {
                    alert("Nenhuma escala oficial encontrada para este mês. Solicite aos Admins.");
                }
            } catch (err) {
                console.error("Erro na busca:", err);
            }
        }
    </script>
</body>
</html>
