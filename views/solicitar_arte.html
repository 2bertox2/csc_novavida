<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação de Arte - CSC Live</title>
    <link rel="icon" href="/public/img/REDONDOSIMBOLO 01.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #1a1a2e; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .form-container { background: #16213e; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 500px; border-top: 4px solid #e94560; margin: 20px 0; }
        .form-header { text-align: center; margin-bottom: 25px; }
        .form-header img { max-width: 120px; margin-bottom: 10px; }
        .form-header h2 { color: #e94560; font-size: 22px; }
        .form-header p { color: #a2a2bd; font-size: 14px; margin-top: 5px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #0f3460; background: #1a1a2e; color: #fff; outline: none; transition: 0.3s; }
        .form-group input:focus, .form-group textarea:focus { border-color: #e94560; box-shadow: 0 0 5px rgba(233, 69, 96, 0.3); }

        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }

        .checkbox-group { display: flex; align-items: center; gap: 10px; background: #0f3460; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .checkbox-group input { width: 20px; height: 20px; cursor: pointer; }
        .checkbox-group label { margin: 0; cursor: pointer; font-size: 13px; color: #a2a2bd; line-height: 1.4; }

        .btn-submit { width: 100%; padding: 15px; background: #e94560; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-submit:hover { background: #d13d56; transform: translateY(-2px); }
        
        /* SISTEMA DE NOTIFICAÇÕES (TOAST) */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #fff; color: #333; padding: 15px 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; border-left: 5px solid #e94560; animation: slideIn 0.3s ease forwards; min-width: 300px; font-weight: 600; font-size: 14px; }
        .toast i { font-size: 20px; }
        .toast.success { border-left-color: #28a745; }
        .toast.success i { color: #28a745; }
        .toast.warning { border-left-color: #ffc107; }
        .toast.warning i { color: #ffc107; }
        .toast.error { border-left-color: #dc3545; }
        .toast.error i { color: #dc3545; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

        @media (max-width: 500px) {
            .row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="form-container" id="form-area">
        <div class="form-header">
            <img src="/public/img/REDONDOSIMBOLO 01.png" alt="Logo Nova Vida BH" onerror="this.style.display='none'">
            <h2>Central de Mídia</h2>
            <p>Preencha os dados abaixo para solicitar sua arte.</p>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Nome e Sobrenome</label>
                <input type="text" id="nomeReq" placeholder="Ex: João Silva" required>
            </div>
            <div class="form-group">
                <label>Ministério</label>
                <input type="text" id="minReq" placeholder="Ex: Jovens" required>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="emailReq" placeholder="seuemail@exemplo.com" required>
            </div>
            <div class="form-group">
                <label>WhatsApp</label>
                <input type="text" id="whatsappReq" placeholder="(XX) XXXXX-XXXX" required>
            </div>
        </div>

        <div class="form-group">
            <label>O que você quer que a gente crie?</label>
            <textarea id="descricaoReq" rows="5" placeholder="Descreva todos os detalhes: tema, textos que devem aparecer na imagem, referências, estilo..." required></textarea>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="anexosReq">
            <label for="anexosReq"><strong>Tenho arquivos/fotos para a arte.</strong><br>A equipe de mídia entrará em contato pelo seu WhatsApp para solicitar os anexos.</label>
        </div>

        <button class="btn-submit" onclick="enviarSolicitacao()">Enviar Solicitação</button>
    </div>

    <script>
        function mostrarToast(mensagem, tipo = 'warning') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${tipo}`;
            let icon = '<i class="fas fa-exclamation-circle"></i>';
            if(tipo === 'error') icon = '<i class="fas fa-times-circle"></i>';
            if(tipo === 'success') icon = '<i class="fas fa-check-circle"></i>';
            toast.innerHTML = `${icon} <div>${mensagem}</div>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function enviarSolicitacao() {
            const nome = document.getElementById('nomeReq').value;
            const ministerio = document.getElementById('minReq').value;
            const email = document.getElementById('emailReq').value;
            const zap = document.getElementById('whatsappReq').value;
            const desc = document.getElementById('descricaoReq').value;
            const temAnexo = document.getElementById('anexosReq').checked;

            if (!nome || !ministerio || !email || !zap || !desc) {
                mostrarToast("Por favor, preencha todos os campos obrigatórios antes de enviar.", "warning");
                return;
            }

            let descricaoFinal = `📍 Ministério: ${ministerio}\n📧 E-mail: ${email}\n📱 WhatsApp: ${zap}\n\n📝 O que deseja criar:\n${desc}`;
            
            if (temAnexo) {
                descricaoFinal += `\n\n🚨 ATENÇÃO: O solicitante marcou que possui arquivos/fotos. Chame no WhatsApp para recolher os anexos.`;
            }

            const dadosChamado = {
                titulo: `Criação de Arte: ${nome}`,
                categoria: "Arte para Culto/Evento",
                prioridade: "Média",
                requerente: nome,
                descricao: descricaoFinal,
                progresso: 100
            };

            const btn = document.querySelector('.btn-submit');
            btn.innerText = 'Enviando...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/chamados', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosChamado)
                });

                if (response.ok) {
                    document.getElementById('form-area').innerHTML = `
                        <div style="text-align: center; padding: 30px 10px;">
                            <div style="font-size: 50px; margin-bottom: 20px;">✅</div>
                            <h2 style="color: #28a745; margin-bottom: 15px;">Solicitação Enviada!</h2>
                            <p style="color: #a2a2bd; line-height: 1.6;">Sua solicitação foi registrada com sucesso na Central de Mídia.<br>Nossa equipe analisará o pedido e entrará em contato pelo WhatsApp informado.</p>
                            <br>
                            <button class="btn-submit" onclick="window.location.reload()" style="margin-top: 20px;">Fazer Nova Solicitação</button>
                        </div>
                    `;
                }
            } catch (erro) {
                mostrarToast("Erro de conexão ao tentar enviar a solicitação. Verifique sua internet.", "error");
                btn.innerText = 'Enviar Solicitação';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
